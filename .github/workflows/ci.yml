name: CI Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Verify Production Build
      run: npm run build
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/jkosi
        PAYLOAD_SECRET: ci_payload_secret_key_mock
        NEXT_PUBLIC_SERVER_URL: http://localhost:3000
