version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: jkosi-postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jkosi-web-app
    restart: always
    ports:
      - "${APP_PORT}:3000"
    depends_on:
      - db
    environment:
      # Database — always connects to the db service container by name
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      # Payload CMS encryption key
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      # Public URL of the app (used for redirects and links)
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}

volumes:
  pgdata:
